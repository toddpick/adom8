trigger: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  # The following variables must be provided by the user when running the pipeline:
  # - ONBOARDING_PAT (secret)
  # - AZURE_SUBSCRIPTION_ID
  # - AZURE_DEVOPS_ORG (Must be the full URL, e.g., https://dev.azure.com/yourorg)
  # - AZURE_DEVOPS_PROJECT
  # - GITHUB_ORG
  # - GITHUB_REPO
  # - CLAUDE_API_KEY (secret)  ← Anthropic; provide this OR OPENAI_API_KEY (at least one required)
  # - OPENAI_API_KEY (secret)   ← OpenAI; used as primary if CLAUDE_API_KEY is not set
  # - RESOURCE_GROUP_NAME
  # - LOCATION
  # - GITHUB_TOKEN (secret)
  # - AZURE_SERVICE_CONNECTION
  # - AdoDashboardKey (secret)
  # - COPILOT_ENABLED (optional; defaults to true)

  # Resource names are derived at runtime from RESOURCE_GROUP_NAME so they are
  # stable across re-runs — same group name always produces the same suffix.
  # These placeholders are overwritten by the 'Compute Resource Names' step.
  FUNCTION_APP_NAME: 'adom8-func-placeholder'
  STORAGE_ACCOUNT_NAME: 'adom8stplaceholder'
  KEY_VAULT_NAME: 'adom8-kv-placeholder'
  COPILOT_ENABLED: 'true'
  COPILOT_MODE: 'Auto'
  COPILOT_COMPLEXITY_THRESHOLD: '8'
  COPILOT_CREATE_ISSUE: 'true'
  COPILOT_MODEL: 'copilot'
  COPILOT_WEBHOOK_SECRET: ''

stages:
- stage: Infrastructure
  displayName: 'Stage 1: Azure Infrastructure'
  jobs:
  - job: DeployInfra
    displayName: 'Deploy Azure Resources'
    steps:
    - task: AzureCLI@2
      displayName: 'Create Resource Group, Storage, Key Vault, and Function App'
      inputs:
        azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # Compute stable 8-char suffix from resource group name so resource
          # names are identical on every re-run (idempotent).
          SUFFIX=$(echo -n "$(RESOURCE_GROUP_NAME)" | sha256sum | cut -c1-8)
          PROJECT_SLUG=$(echo "$(AZURE_DEVOPS_PROJECT)" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//' | sed 's/-$//')
          if [ -z "$PROJECT_SLUG" ]; then PROJECT_SLUG="adom8"; fi
          SWA_BASE=$(echo "$PROJECT_SLUG" | cut -c1-35)
          FUNCTION_APP_NAME="adom8-func-${SUFFIX}"
          STORAGE_ACCOUNT_NAME="adom8st${SUFFIX}"
          KEY_VAULT_NAME="adom8-kv-${SUFFIX}"
          SWA_NAME="${SWA_BASE}-${SUFFIX}"
          echo "##vso[task.setvariable variable=FUNCTION_APP_NAME]$FUNCTION_APP_NAME"
          echo "##vso[task.setvariable variable=STORAGE_ACCOUNT_NAME]$STORAGE_ACCOUNT_NAME"
          echo "##vso[task.setvariable variable=KEY_VAULT_NAME]$KEY_VAULT_NAME"
          echo "##vso[task.setvariable variable=SWA_NAME]$SWA_NAME"
          echo "Resource names: FuncApp=$FUNCTION_APP_NAME | Storage=$STORAGE_ACCOUNT_NAME | KV=$KEY_VAULT_NAME | SWA=$SWA_NAME"

          echo "Creating Resource Group: $(RESOURCE_GROUP_NAME) in $(LOCATION)"
          az group create --name $(RESOURCE_GROUP_NAME) --location $(LOCATION)

          echo "Creating Storage Account: $STORAGE_ACCOUNT_NAME"
          az storage account show --name $STORAGE_ACCOUNT_NAME --resource-group $(RESOURCE_GROUP_NAME) 2>/dev/null || \
            az storage account create --name $STORAGE_ACCOUNT_NAME --resource-group $(RESOURCE_GROUP_NAME) --location $(LOCATION) --sku Standard_LRS

          echo "Creating Key Vault: $KEY_VAULT_NAME"
          az keyvault show --name $KEY_VAULT_NAME --resource-group $(RESOURCE_GROUP_NAME) 2>/dev/null || \
            az keyvault create --name $KEY_VAULT_NAME --resource-group $(RESOURCE_GROUP_NAME) --location $(LOCATION) --enable-rbac-authorization false

          echo "Ensuring Windows Consumption Function App: $FUNCTION_APP_NAME"
          if az functionapp show --name $FUNCTION_APP_NAME --resource-group $(RESOURCE_GROUP_NAME) >/dev/null 2>&1; then
            IS_LINUX=$(az functionapp show --name $FUNCTION_APP_NAME --resource-group $(RESOURCE_GROUP_NAME) --query "reserved" -o tsv)
            if [ "$IS_LINUX" = "true" ]; then
              echo "Existing app is Linux. Recreating as Windows Consumption (Y1-compatible)."
              az functionapp delete --name $FUNCTION_APP_NAME --resource-group $(RESOURCE_GROUP_NAME)
            else
              echo "Existing app is Windows-compatible. Reusing app."
            fi
          fi

          az functionapp show --name $FUNCTION_APP_NAME --resource-group $(RESOURCE_GROUP_NAME) >/dev/null 2>&1 || \
            az functionapp create --name $FUNCTION_APP_NAME --resource-group $(RESOURCE_GROUP_NAME) --storage-account $STORAGE_ACCOUNT_NAME --consumption-plan-location $(LOCATION) --functions-version 4 --os-type Windows --runtime dotnet-isolated --runtime-version 8.0

          echo "Creating Static Web App: $SWA_NAME"
          az staticwebapp show --name $SWA_NAME --resource-group $(RESOURCE_GROUP_NAME) 2>/dev/null || \
            az staticwebapp create --name $SWA_NAME --resource-group $(RESOURCE_GROUP_NAME) --location $(LOCATION) --sku Free

          echo "Retrieving Static Web App hostname and adding CORS to Function App"
          SWA_HOSTNAME=$(az staticwebapp show --name $SWA_NAME --resource-group $(RESOURCE_GROUP_NAME) --query "defaultHostname" -o tsv)
          az functionapp cors add --name $FUNCTION_APP_NAME --resource-group $(RESOURCE_GROUP_NAME) --allowed-origins "https://$SWA_HOSTNAME"

          echo "Adding CORS for any additional Static Web Apps in resource group"
          ALL_SWA_HOSTNAMES=$(az staticwebapp list --resource-group $(RESOURCE_GROUP_NAME) --query "[].defaultHostname" -o tsv)
          for hostname in $ALL_SWA_HOSTNAMES; do
            if [ -n "$hostname" ] && [ "$hostname" != "$SWA_HOSTNAME" ]; then
              echo "Adding CORS for extra SWA: https://$hostname"
              az functionapp cors add --name $FUNCTION_APP_NAME --resource-group $(RESOURCE_GROUP_NAME) --allowed-origins "https://$hostname"
            fi
          done

          echo "Retrieving Static Web App deployment token"
          SWA_TOKEN=$(az staticwebapp secrets list --name $SWA_NAME --resource-group $(RESOURCE_GROUP_NAME) --query "properties.apiKey" -o tsv)
          echo "##vso[task.setvariable variable=SWA_TOKEN;issecret=true]$SWA_TOKEN"

          echo "Enabling Managed Identity for Function App"
          PRINCIPAL_ID=$(az functionapp identity assign --name $FUNCTION_APP_NAME --resource-group $(RESOURCE_GROUP_NAME) --query principalId -o tsv)

          echo "Setting Key Vault access policy for Function App"
          az keyvault set-policy --name $KEY_VAULT_NAME --object-id $PRINCIPAL_ID --secret-permissions get list set

          echo "##vso[task.setvariable variable=FUNCTION_PRINCIPAL_ID]$PRINCIPAL_ID"

    - task: DotNetCoreCLI@2
      displayName: 'Build Azure Function'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'src/AIAgents.Functions/AIAgents.Functions.csproj'
        arguments: '--configuration Release --output $(System.DefaultWorkingDirectory)/publish_output'
        zipAfterPublish: true

    - task: AzureFunctionApp@2
      displayName: 'Deploy Azure Function'
      inputs:
        azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
        appType: 'functionApp'
        appName: '$(FUNCTION_APP_NAME)'
        package: '$(System.DefaultWorkingDirectory)/publish_output/**/*.zip'

    - task: AzureCLI@2
      displayName: 'Validate Function Host Discovery'
      inputs:
        azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -euo pipefail

          FUNCTION_APP_NAME="$(FUNCTION_APP_NAME)"
          RESOURCE_GROUP_NAME="$(RESOURCE_GROUP_NAME)"
          FUNCTION_URL="https://${FUNCTION_APP_NAME}.azurewebsites.net/api/health"

          echo "Waiting for functions to be indexed..."
          indexed=""
          for i in {1..18}; do
            indexed=$(az functionapp function list --name "$FUNCTION_APP_NAME" --resource-group "$RESOURCE_GROUP_NAME" --query "length(@)" -o tsv || echo "0")
            echo "Attempt $i: indexed functions = ${indexed}"
            if [ "${indexed}" != "0" ] && [ -n "${indexed}" ]; then
              break
            fi
            sleep 10
          done

          if [ -z "${indexed}" ] || [ "${indexed}" = "0" ]; then
            echo "ERROR: No functions were indexed after deployment."
            exit 1
          fi

          echo "Checking health endpoint: ${FUNCTION_URL}"
          health_code=$(curl -sS -o /dev/null -w "%{http_code}" "$FUNCTION_URL" || true)
          echo "Health endpoint HTTP ${health_code}"
          # 200 = healthy, 503 = app running but not yet configured (secrets set in Stage 2) — both are valid here.
          # 404 means the host never loaded functions; anything else is an unexpected failure.
          if [ "$health_code" = "404" ] || [ -z "$health_code" ]; then
            echo "ERROR: Health endpoint returned 404 — functions not loaded by host."
            exit 1
          fi
          echo "Host is responding (HTTP ${health_code}). Full health verified after Stage 2 configuration."

    - bash: |
        sed -i 's|__FUNCTION_APP_URL__|https://$(FUNCTION_APP_NAME).azurewebsites.net|g' dashboard/index.html
        SAFE_ADO_PROJECT_NAME=$(printf '%s' "$(AZURE_DEVOPS_PROJECT)" | sed 's/[&|]/\\&/g')
        sed -i "s|__ADO_PROJECT_NAME__|$SAFE_ADO_PROJECT_NAME|g" dashboard/index.html
      displayName: 'Update Function App URL in Dashboard'

    - task: AzureStaticWebApp@0
      displayName: 'Deploy Dashboard to Static Web App'
      inputs:
        app_location: 'dashboard'
        skip_app_build: true
        skip_api_build: true
        azure_static_web_apps_api_token: '$(SWA_TOKEN)'

- stage: Configuration
  displayName: 'Stages 2-7: Configuration and Validation'
  dependsOn: Infrastructure
  jobs:
  - job: RunSetupScript
    displayName: 'Run Setup Script'
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.x'
        addToPath: true

    - script: |
        python -m pip install --upgrade pip
        pip install requests azure-identity azure-keyvault-secrets azure-mgmt-resource
      displayName: 'Install Python Dependencies'

    - task: AzureCLI@2
      displayName: 'Run Python Setup Script'
      inputs:
        azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # Recompute stable resource names (same logic as Stage 1)
          SUFFIX=$(echo -n "$(RESOURCE_GROUP_NAME)" | sha256sum | cut -c1-8)
          FUNCTION_APP_NAME="adom8-func-${SUFFIX}"
          KEY_VAULT_NAME="adom8-kv-${SUFFIX}"
          echo "Using FuncApp=$FUNCTION_APP_NAME | KV=$KEY_VAULT_NAME"

          echo "Creating Function App Key for Dashboard"
          az functionapp keys set --name $FUNCTION_APP_NAME --resource-group $(RESOURCE_GROUP_NAME) --key-type functionKeys --key-name AdoDashboardKey --key-value "$(AdoDashboardKey)"

          # Get Function App Key
          FUNCTION_KEY=$(az rest --method post --uri "https://management.azure.com/subscriptions/$(AZURE_SUBSCRIPTION_ID)/resourceGroups/$(RESOURCE_GROUP_NAME)/providers/Microsoft.Web/sites/${FUNCTION_APP_NAME}/host/default/listKeys?api-version=2022-03-01" --query "functionKeys.default" -o tsv)
          
          export FUNCTION_KEY=$FUNCTION_KEY
          export ONBOARDING_PAT="$(ONBOARDING_PAT)"
          export CLAUDE_API_KEY="$(CLAUDE_API_KEY)"
          export OPENAI_API_KEY="$(OPENAI_API_KEY)"
          export GITHUB_TOKEN="$(GITHUB_TOKEN)"
          export COPILOT_ENABLED="$(COPILOT_ENABLED)"
          export COPILOT_MODE="$(COPILOT_MODE)"
          export COPILOT_COMPLEXITY_THRESHOLD="$(COPILOT_COMPLEXITY_THRESHOLD)"
          export COPILOT_CREATE_ISSUE="$(COPILOT_CREATE_ISSUE)"
          export COPILOT_MODEL="$(COPILOT_MODEL)"
          export COPILOT_WEBHOOK_SECRET="$(COPILOT_WEBHOOK_SECRET)"
          
          python scripts/adom8-pipeline-setup.py \
            --subscription-id "$(AZURE_SUBSCRIPTION_ID)" \
            --ado-org "$(AZURE_DEVOPS_ORG)" \
            --ado-project "$(AZURE_DEVOPS_PROJECT)" \
            --github-org "$(GITHUB_ORG)" \
            --github-repo "$(GITHUB_REPO)" \
            --resource-group "$(RESOURCE_GROUP_NAME)" \
            --function-app "${FUNCTION_APP_NAME}" \
            --key-vault "${KEY_VAULT_NAME}"

    - task: AzureCLI@2
      displayName: 'Final Pipeline Summary'
      inputs:
        azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -euo pipefail

          SUFFIX=$(echo -n "$(RESOURCE_GROUP_NAME)" | sha256sum | cut -c1-8)
          FUNCTION_APP_NAME="adom8-func-${SUFFIX}"
          FUNCTION_URL="https://${FUNCTION_APP_NAME}.azurewebsites.net/api/health"

          APP_STATE=$(az functionapp show --name "$FUNCTION_APP_NAME" --resource-group "$(RESOURCE_GROUP_NAME)" --query "state" -o tsv)
          APP_KIND=$(az functionapp show --name "$FUNCTION_APP_NAME" --resource-group "$(RESOURCE_GROUP_NAME)" --query "kind" -o tsv)
          IS_LINUX=$(az functionapp show --name "$FUNCTION_APP_NAME" --resource-group "$(RESOURCE_GROUP_NAME)" --query "reserved" -o tsv)
          PLAN_ID=$(az functionapp show --name "$FUNCTION_APP_NAME" --resource-group "$(RESOURCE_GROUP_NAME)" --query "serverFarmId" -o tsv)
          PLAN_SKU=$(az appservice plan show --ids "$PLAN_ID" --query "sku.tier" -o tsv)
          PLAN_OS=$(az appservice plan show --ids "$PLAN_ID" --query "reserved" -o tsv)
          INDEXED_COUNT=$(az functionapp function list --name "$FUNCTION_APP_NAME" --resource-group "$(RESOURCE_GROUP_NAME)" --query "length(@)" -o tsv || echo "0")
          HEALTH_CODE=$(curl -sS -o /dev/null -w "%{http_code}" "$FUNCTION_URL" || true)

          APP_OS="Windows"
          if [ "$IS_LINUX" = "true" ]; then
            APP_OS="Linux"
          fi

          PLAN_OS_LABEL="Windows"
          if [ "$PLAN_OS" = "true" ]; then
            PLAN_OS_LABEL="Linux"
          fi

          echo ""
          echo "========================================"
          echo "FINAL PIPELINE SUMMARY"
          echo "========================================"
          echo "Function App:      $FUNCTION_APP_NAME"
          echo "Resource Group:    $(RESOURCE_GROUP_NAME)"
          echo "State:             $APP_STATE"
          echo "App OS:            $APP_OS"
          echo "Kind:              $APP_KIND"
          echo "Plan SKU Tier:     $PLAN_SKU"
          echo "Plan OS:           $PLAN_OS_LABEL"
          echo "Indexed Functions: $INDEXED_COUNT"
          echo "Health Endpoint:   $FUNCTION_URL"
          echo "Health HTTP:       $HEALTH_CODE"
          echo "========================================"
