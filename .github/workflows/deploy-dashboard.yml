name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Function App URL
        run: |
          FUNC_URL="https://${{ secrets.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net"
          sed -i "s|__FUNCTION_APP_URL__|${FUNC_URL}|g" dashboard/index.html

          ADO_PROJECT_NAME="${{ vars.AZURE_DEVOPS_PROJECT }}"
          if [ -z "$ADO_PROJECT_NAME" ]; then
            ADO_PROJECT_NAME="${{ secrets.AZURE_DEVOPS_PROJECT }}"
          fi
          if [ -z "$ADO_PROJECT_NAME" ]; then
            ADO_PROJECT_NAME="ADO PROJECT NAME"
          fi

          SAFE_ADO_PROJECT_NAME=$(printf '%s' "$ADO_PROJECT_NAME" | sed 's/[&|]/\\&/g')
          sed -i "s|__ADO_PROJECT_NAME__|${SAFE_ADO_PROJECT_NAME}|g" dashboard/index.html

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/dashboard"
          skip_app_build: true
