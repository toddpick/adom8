name: Deploy Azure Functions

on:
  push:
    branches: [main]
    paths:
      - 'src/**'

env:
  DOTNET_VERSION: '8.0.x'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'src/AIAgents.Functions'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/AIAgents.sln

      - name: Build
        run: dotnet build src/AIAgents.sln --configuration Release --no-restore

      - name: Publish Functions
        run: dotnet publish ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/AIAgents.Functions.csproj --configuration Release --output ./publish

      - name: Deploy to Azure Functions
        if: ${{ secrets.AZURE_FUNCTIONAPP_NAME != '' }}
        uses: azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          package: ./publish
